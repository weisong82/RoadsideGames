name: 构建、测试与部署

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:   # 支持手动触发

# 同一分支只保留最新一次运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: 代码质量检查
  # ─────────────────────────────────────────────
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装检查工具
        run: |
          npm install -g htmlhint stylelint stylelint-config-standard

      - name: HTML 语法检查
        run: |
          npx htmlhint "**/*.html" --config .htmlhintrc || true

      - name: CSS 语法检查
        run: |
          npx stylelint "css/**/*.css" --config .stylelintrc.json || true

      - name: JS 语法检查（基础）
        run: |
          node --check js/store.js
          node --check js/games.js
          node --check js/game-engine.js
          node --check js/app.js
          node --check games/shop-game.js
          node --check games/plant-game.js
          node --check games/sound-game.js
          node --check games/color-game.js
          node --check games/people-game.js
          node --check components/badge-card.js
          echo "✅ 所有 JS 文件语法检查通过"

  # ─────────────────────────────────────────────
  # Job 2: 可访问性与链接检查
  # ─────────────────────────────────────────────
  test:
    name: 可访问性与链接检查
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装测试工具
        run: |
          npm install -g serve @lhci/cli

      - name: 启动静态服务器（后台）
        run: |
          npx serve . -p 5000 &
          sleep 3
          echo "服务器已启动"

      - name: 验证站点可访问
        run: |
          curl -f http://localhost:5000 -o /dev/null -s && \
          echo "✅ 首页可正常访问" || \
          (echo "❌ 首页无法访问" && exit 1)

      - name: 检查资源文件完整性
        run: |
          # 确认 HTML 中引用的 JS/CSS 文件都存在
          echo "检查 CSS 文件..."
          [ -f "css/main.css" ] && echo "✅ css/main.css" || (echo "❌ css/main.css 缺失" && exit 1)

          echo "检查 JS 核心文件..."
          for f in js/store.js js/games.js js/game-engine.js js/app.js; do
            [ -f "$f" ] && echo "✅ $f" || (echo "❌ $f 缺失" && exit 1)
          done

          echo "检查游戏文件..."
          for f in games/shop-game.js games/plant-game.js games/sound-game.js games/color-game.js games/people-game.js; do
            [ -f "$f" ] && echo "✅ $f" || (echo "❌ $f 缺失" && exit 1)
          done

          echo "检查组件文件..."
          [ -f "components/badge-card.js" ] && echo "✅ components/badge-card.js" || (echo "❌ 缺失" && exit 1)

          echo "✅ 所有资源文件完整"

      - name: 运行 Lighthouse CI 性能检查
        run: |
          lhci autorun \
            --collect.url=http://localhost:5000 \
            --collect.numberOfRuns=1 \
            --assert.preset=lighthouse:no-pwa \
            --assert.assertions.categories:performance=off \
            --upload.target=temporary-public-storage || true
        continue-on-error: true   # Lighthouse 分数不影响部署

      - name: 上传 Lighthouse 报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 3: 构建产物（压缩优化）
  # ─────────────────────────────────────────────
  build:
    name: 构建优化产物
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装构建工具
        run: |
          npm install -g html-minifier-terser terser clean-css-cli

      - name: 创建构建目录
        run: mkdir -p dist

      - name: 复制并压缩 HTML
        run: |
          npx html-minifier-terser index.html \
            --collapse-whitespace \
            --remove-comments \
            --remove-optional-tags \
            --remove-redundant-attributes \
            --remove-script-type-attributes \
            --remove-tag-whitespace \
            --use-short-doctype \
            --minify-css true \
            --minify-js true \
            -o dist/index.html
          echo "✅ HTML 压缩完成"

      - name: 压缩 CSS
        run: |
          mkdir -p dist/css
          npx cleancss -o dist/css/main.css css/main.css
          echo "✅ CSS 压缩完成"

      - name: 压缩 JS 文件
        run: |
          mkdir -p dist/js dist/games dist/components

          for f in js/store.js js/games.js js/game-engine.js js/app.js; do
            out="dist/$f"
            npx terser "$f" -o "$out" --compress --mangle
            echo "✅ $f → $out"
          done

          for f in games/shop-game.js games/plant-game.js games/sound-game.js games/color-game.js games/people-game.js; do
            out="dist/$f"
            npx terser "$f" -o "$out" --compress --mangle
            echo "✅ $f → $out"
          done

          npx terser components/badge-card.js -o dist/components/badge-card.js --compress --mangle
          echo "✅ badge-card.js 压缩完成"

      - name: 输出构建体积对比
        run: |
          echo "======= 构建体积报告 ======="
          echo "原始大小："
          du -sh index.html css/ js/ games/ components/ 2>/dev/null | head -20
          echo "---"
          echo "压缩后大小："
          du -sh dist/
          echo "============================="

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 4: 部署到 GitHub Pages（仅 main 分支）
  # ─────────────────────────────────────────────
  deploy-pages:
    name: 部署到 GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    # GitHub Pages 部署权限
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上传到 GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 输出部署地址
        run: |
          echo "🚀 部署成功！"
          echo "访问地址: ${{ steps.deployment.outputs.page_url }}"
